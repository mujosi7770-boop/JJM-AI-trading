<!DOCTYPE html><html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Intelligence v5.0</title><script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    'v-bg': '#05070a',
                    'v-card': 'rgba(22, 27, 40, 0.8)',
                    'v-accent': '#00ff85',
                    'v-danger': '#ff4d4d',
                }
            }
        }
    }
</script>

<style>
    body { font-family: 'Inter', sans-serif; background-color: #05070a; color: white; overflow-x: hidden; }
    .glass-card { background: rgba(22, 27, 40, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    .view { display: none; animation: fadeIn 0.3s ease; }
    .view.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    #ticker-container { height: 180px; overflow: hidden; position: relative; }
    #ticker-wall { animation: scrollUp 4s linear infinite; }
    @keyframes scrollUp { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
    
    .status-up { color: #00ff85; text-shadow: 0 0 5px rgba(0,255,133,0.5); }
    .status-down { color: #ff4d4d; text-shadow: 0 0 5px rgba(255,77,77,0.5); }
</style>

</head>
<body><div id="toast" class="fixed -top-16 left-1/2 -translate-x-1/2 bg-v-accent text-black px-6 py-3 rounded-full font-bold shadow-lg transition-all duration-500 z-[10000]">Action réussie !</div>

<div id="v-auth" class="fixed inset-0 bg-v-bg z-[5000] p-8 flex flex-col justify-center">
    <!-- FORMULAIRES INSCRIPTION/LOGIN INCHANGÉS -->
</div>

<div id="v-rules" class="fixed inset-0 bg-v-bg z-[6000] p-6 hidden flex-col justify-center items-center">
    <!-- RÈGLES DU JEU INCHANGÉES -->
</div>

<div id="v-promo" class="fixed inset-0 bg-v-bg z-[7000] p-8 hidden flex-col justify-center items-center text-center">
    <!-- PROMO INCHANGÉE -->
</div>

<div class="container max-w-[450px] mx-auto p-5 pb-24">
    <header class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-light italic">ID: <span class="font-bold text-v-accent current-user-code">--</span></h1>
    </header>

    <div id="v-dash" class="view active">
        <!-- DASHBOARD INCHANGÉ -->
    </div>

    <div id="v-ret" class="view">
        <input type="number" id="in-ret-amt" placeholder="Montant MT (Max 640 MT)" class="w-full p-4 rounded-xl bg-black/50 border border-white/5 text-white outline-none" oninput="checkWithdrawalReady()">
        <input type="password" id="retrait-pin-confirm" placeholder="PIN SECRET" class="w-full p-4 rounded-xl bg-v-accent/5 border border-v-accent/20 text-center font-bold text-v-accent" oninput="checkWithdrawalReady()">
        <button id="btn-withdraw" class="w-full p-4 bg-white text-black font-black rounded-xl uppercase hidden" onclick="handleWithdrawal()">Valider le retrait</button>
    </div>

    <div id="v-depo" class="view">
        <!-- DÉPÔT INCHANGÉ -->
    </div>
</div>

<script>
    const usdRate = 64.00;
    const clientCodes = ["I.C", "L.NG", "B.G", "M.YV", "X.K", "V.Z", "R.T", "S.O"];
    let currentUser = null;
    let clients = JSON.parse(localStorage.getItem('vanguard_data')) || {};

    if (Object.keys(clients).length === 0) {
        clientCodes.forEach(code => {
            clients[code] = { code, balance: Math.random() * 5000 + 1000, secret: "1234" };
        });
        save();
    }

    function save() { localStorage.setItem('vanguard_data', JSON.stringify(clients)); }

    window.onload = () => {
        const savedUser = localStorage.getItem('vanguard_session');
        if(savedUser && clients[savedUser]) {
            currentUser = savedUser;
            document.getElementById('v-auth').style.display = 'none';
            loginSuccess();
        }
        initTicker();
        startLiveUpdates();
    };

    // ✅ Gestion du bouton retrait qui n'apparaît qu'après saisie
    function checkWithdrawalReady() {
        const amt = document.getElementById('in-ret-amt').value;
        const pin = document.getElementById('retrait-pin-confirm').value;
        const btn = document.getElementById('btn-withdraw');
        if (amt && pin.length >= 3) {
            btn.classList.remove('hidden');
        } else {
            btn.classList.add('hidden');
        }
    }

    // ✅ Retrait effectif uniquement du montant saisi
    function handleWithdrawal() {
        const amt = parseFloat(document.getElementById('in-ret-amt').value);
        const user = clients[currentUser];
        if (user.balance < (20 * usdRate)) return notify("Solde minimum 20$ requis");
        if (user.balance < (50 * usdRate) && amt > (10 * usdRate)) return notify("Max 10$ autorisé");
        user.balance -= amt;
        notify("Retrait validé avec succès !");
        updateUI();
        document.getElementById('btn-withdraw').classList.add('hidden');
    }

    function notify(text) {
        const t = document.getElementById('toast');
        t.innerText = text; t.style.top = '20px';
        setTimeout(() => t.style.top = '-64px', 3000);
    }

    function loginSuccess() { document.querySelectorAll('.current-user-code').forEach(el => el.innerText = currentUser); updateUI(); }
    function updateUI() { const user = clients[currentUser]; document.getElementById('display-bal').innerText = user.balance.toLocaleString('fr-FR', {minimumFractionDigits: 2}); document.getElementById('display-bal-usd').innerText = (user.balance / usdRate).toFixed(2); save(); }
    function initTicker() { let html=""; [...clientCodes,...clientCodes,...clientCodes].forEach(code=>{const profit=(Math.random()*80).toFixed(2);html+=`<div class="flex justify-between items-center text-[10px] font-mono p-1"><span class="text-gray-500">> ${code}</span><span class="status-up">+${profit} MT</span><span class="opacity-20 uppercase italic">Vanguard_IA</span></div>`});document.getElementById('ticker-wall').innerHTML=html;}
    function startLiveUpdates() { setInterval(()=>{clientCodes.forEach(code=>{const change=(Math.random()*50-18);clients[code].balance+=change;if(clients[code].balance<0) clients[code].balance=0;});updateUI();},1200); }
</script>

</body>
</html>
